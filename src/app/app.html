<div class="min-h-screen bg-slate-50">
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
          <mat-icon>track_changes</mat-icon>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-800 leading-tight">OJT Tracker</h1>
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Internship Progress System</p>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="p-2 text-slate-400 hover:text-slate-600 transition-colors">
          <mat-icon>notifications</mat-icon>
        </button>
        <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 overflow-hidden">
          <img src="https://picsum.photos/seed/ojt/100/100" alt="User" referrerpolicy="no-referrer">
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Stats Overview -->
    <section class="mb-8">
      <app-stats></app-stats>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Calendar View -->
      <div class="lg:col-span-7">
        <app-calendar></app-calendar>
      </div>

      <!-- Controls & Logs -->
      <div class="lg:col-span-5">
        <app-log-form></app-log-form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 border-t border-slate-200 mt-12">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 text-slate-400 text-sm">
      <p>&copy; 2026 OJT Tracker. All rights reserved.</p>
      <div class="flex items-center gap-6">
        <a href="#" class="hover:text-indigo-600 transition-colors">Privacy Policy</a>
        <a href="#" class="hover:text-indigo-600 transition-colors">Terms of Service</a>
        <a href="#" class="hover:text-indigo-600 transition-colors">Support</a>
      </div>
    </div>
  </footer>
</div>
